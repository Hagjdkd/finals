<main class="main">

  <div class="content">

    <!-- HEADER -->
    <div class="header">
      <div>
        <p class="welcome">Welcome back 👋</p>
        <h1>User Dashboard</h1>
      </div>

      <div class="profile">
        <div class="avatar"></div>
        <span>{{userName}}</span>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="card">
        <h3>Total Complaints</h3>
        <p>{{total}}</p>
      </div>

      <div class="card">
        <h3>Pending</h3>
        <p>{{pending}}</p>
      </div>

      <div class="card">
        <h3>In Progress</h3>
        <p>{{progress}}</p>
      </div>

      <div class="card">
        <h3>Resolved</h3>
        <p>{{resolved}}</p>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-card">
      <h2>My Complaints</h2>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Complaint</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let c of complaints">
            <td>#{{c.id}}</td>
            <td>{{c.description}}</td>
            <td>{{c.date}}</td>
            <td>
              <span class="status" [ngClass]="c.status.toLowerCase().replace(' ', '')">
                {{c.status}}
              </span>
            </td>
          </tr>

          <tr *ngIf="complaints.length === 0">
            <td colspan="4" class="no-data">
              No complaints submitted yet
            </td>
          </tr>

        </tbody>
      </table>

    </div>

  </div>

</main>
